# AI Risk Reviewer Assignment
# Activated in Phase 4. Computes a simple risk score and comments on high-risk PRs.
# This is a starter heuristic; the platform risk engine (docs/risk-policy-engine.md) is authoritative.

name: AI Risk Reviewer Assignment

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  assign-reviewers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate simple risk score
        id: risk
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          BASE_REF="origin/${{ github.base_ref }}"
          CHANGED_LINES=$(git diff --numstat "$BASE_REF"...HEAD | awk '{added+=$1; deleted+=$2} END {print added+deleted+0}')
          RISK=0
          if [ "$CHANGED_LINES" -gt 300 ]; then RISK=$((RISK+5)); fi
          if git diff --name-only "$BASE_REF"...HEAD | grep -qE '(auth|security|payment|terraform|infra)'; then RISK=$((RISK+5)); fi
          echo "risk=$RISK" >> $GITHUB_OUTPUT
          if [ "$RISK" -ge 10 ]; then
            echo "high_risk=true" >> $GITHUB_OUTPUT
          else
            echo "high_risk=false" >> $GITHUB_OUTPUT
          fi

      - name: Add warning comment for high risk PR
        if: steps.risk.outputs.high_risk == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "High AI delivery risk detected. Please assign a senior reviewer and consider splitting the PR."
            })
