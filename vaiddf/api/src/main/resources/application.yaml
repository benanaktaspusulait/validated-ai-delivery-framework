quarkus:
  application:
    name: vaiddf-api
    version: 0.1.0-SNAPSHOT
  http:
    port: 8080
  rest:
    path: /
  smallrye-health:
    path: /health
  micrometer:
    export:
      prometheus:
        enabled: true
  datasource:
    username: vaiddf
    password: vaiddf
    jdbc:
      url: jdbc:postgresql://localhost:5432/vaiddf
    reactive:
      url: vertx:postgresql://localhost:5432/vaiddf
    devservices:
      enabled: false
  hibernate-orm:
    database:
      generation: drop-and-create
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration

%dev:
  quarkus:
    log:
      level: INFO

%prod:
  quarkus:
    log:
      level: INFO
    hibernate-orm:
      database:
        generation: validate

%test:
  quarkus:
    log:
      level: DEBUG
    datasource:
      username: vaiddf
      password: vaiddf
      jdbc:
        url: jdbc:postgresql://localhost:5432/vaiddf_test
      reactive:
        url: vertx:postgresql://localhost:5432/vaiddf_test
