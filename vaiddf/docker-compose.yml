version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: dist/src/main/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_DATASOURCE_REACTIVE_URL: vertx:postgresql://postgres:5432/vaiddf
      QUARKUS_DATASOURCE_USERNAME: vaiddf
      QUARKUS_DATASOURCE_PASSWORD: vaiddf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vaiddf
      POSTGRES_USER: vaiddf
      POSTGRES_PASSWORD: vaiddf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaiddf"]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    image: curlimages/curl:latest
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./examples:/examples
    entrypoint: ["/bin/sh", "/examples/quickstart.sh"]

volumes:
  pgdata:
