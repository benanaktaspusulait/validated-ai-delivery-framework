version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: dist/src/main/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vaiddf
      POSTGRES_USER: vaiddf
      POSTGRES_PASSWORD: vaiddf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
